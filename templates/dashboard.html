<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Stack — AI Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #07070a;
      --surface:    #0e0e16;
      --surface2:   #14141f;
      --border:     rgba(255,255,255,0.07);
      --border2:    rgba(255,255,255,0.13);
      --text:       #e8e2d9;
      --text-muted: #6b6880;
      --text-dim:   #3e3c4a;
      --amber:      #e8a020;
      --amber-dim:  rgba(232,160,32,0.12);
      --teal:       #18c4a0;
      --teal-dim:   rgba(24,196,160,0.10);
      --red-dim:    rgba(255,85,68,0.10);
      --score-high: #f0c43a;
      --score-mid:  #e8a020;
      --score-low:  #e05a20;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.6;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,7,10,0.88);
      backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(20px, 5vw, 64px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Bodoni Moda', serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--amber);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .date-badge {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    .recipient-badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .recipient-badge strong {
      color: var(--amber);
    }

    /* ─── NAV TABS ─── */
    .nav-tabs {
      display: flex;
      gap: 2px;
      padding: 0 clamp(20px, 5vw, 64px);
      border-bottom: 1px solid var(--border);
      max-width: calc(1280px + clamp(40px, 10vw, 128px));
      margin: 0 auto;
    }

    .nav-tab {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 14px 20px;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-tab.active {
      color: var(--text);
      border-bottom-color: var(--amber);
    }

    .nav-tab:hover:not(.active) {
      color: var(--text);
    }

    /* ─── MAIN ─── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(32px, 5vw, 64px) clamp(20px, 5vw, 64px);
    }

    .section { display: none; }
    .section.active { display: block; }

    /* ─── SECTION HEADER ─── */
    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Bodoni Moda', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .section-title em {
      font-style: italic;
      color: var(--amber);
    }

    .section-count {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ─── VIDEO GRID ─── */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }

    /* ─── VIDEO CARD ─── */
    .video-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 32px 28px 80px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: default;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .video-card:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .rank-number {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Bodoni Moda', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      writing-mode: vertical-lr;
      text-orientation: mixed;
    }

    .card-body {}

    .card-channel {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
      text-decoration: none;
      display: inline-block;
    }

    .card-channel:hover { opacity: 0.7; }

    .card-title {
      font-family: 'Bodoni Moda', serif;
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 10px;
      text-wrap: balance;
    }

    .card-summary {
      font-size: 13.5px;
      line-height: 1.65;
      color: #a09cb0;
      margin-bottom: 14px;
      max-width: 680px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 8px;
    }

    .card-reason {
      font-size: 12px;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 16px;
      padding-left: 10px;
      border-left: 2px solid var(--border2);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .watch-link {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--amber);
      text-decoration: none;
      border: 1px solid rgba(232,160,32,0.3);
      border-radius: 2px;
      padding: 5px 12px;
      transition: background 0.15s, border-color 0.15s;
    }

    .watch-link:hover {
      background: var(--amber-dim);
      border-color: var(--amber);
    }

    /* ─── SCORE BLOCK ─── */
    .card-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 56px;
    }

    .score-value {
      font-family: 'Bodoni Moda', serif;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .score-label {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .score-bar-wrap {
      width: 4px;
      height: 60px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar-fill {
      width: 100%;
      background: var(--score-high);
      border-radius: 2px;
      transform-origin: bottom;
      animation: barGrow 0.8s ease forwards;
      transform: scaleY(0);
    }

    @keyframes barGrow {
      to { transform: scaleY(1); }
    }

    /* ─── EVENTS SECTION ─── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      border-top: 3px solid var(--teal);
      padding: 24px;
      transition: background 0.2s, transform 0.2s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .event-card:hover {
      background: var(--surface2);
      transform: translateY(-2px);
    }

    .event-datetime {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--teal);
      margin-bottom: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .event-datetime span::before {
      content: '─ ';
      opacity: 0.4;
    }

    .event-title {
      font-family: 'Bodoni Moda', serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: var(--text);
    }

    .event-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .event-summary {
      font-size: 13px;
      line-height: 1.6;
      color: #a09cb0;
      margin-bottom: 16px;
    }

    .event-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .event-score {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--teal);
    }

    .rsvp-link {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--teal);
      text-decoration: none;
      border: 1px solid rgba(24,196,160,0.3);
      border-radius: 2px;
      padding: 5px 12px;
      transition: background 0.15s, border-color 0.15s;
    }

    .rsvp-link:hover {
      background: var(--teal-dim);
      border-color: var(--teal);
    }

    .event-hidden { display: none; }

    /* ─── SEE MORE BUTTON ─── */
    .see-more-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: var(--text-muted);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .see-more-btn:hover {
      color: var(--teal);
      border-color: var(--teal);
      background: var(--teal-dim);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state p {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .video-card {
        padding: 20px 20px 20px 56px;
        grid-template-columns: 1fr;
      }
      .card-score {
        flex-direction: row;
        align-items: center;
      }
      .score-bar-wrap { display: none; }
      .header-meta { gap: 12px; }
      .recipient-badge { display: none; }
    }
  </style>
</head>

    // ─── SCORE COLOR ──────────────────────────────────────────────────
    function scoreColor(n) {
      if (n >= 85) return 'var(--score-high)';
      if (n >= 70) return 'var(--score-mid)';
      return 'var(--score-low)';
    }

    // ─── RENDER VIDEOS ────────────────────────────────────────────────
    function renderVideos() {
      const grid = document.getElementById('video-grid');
      document.getElementById('video-count').textContent = `${VIDEOS.length} items ranked`;

      VIDEOS.forEach((v, i) => {
        const tags = v.tools_concepts.map(t => `<span class="tag">${t}</span>`).join('');
        const barHeight = v.score + '%';
        const color = scoreColor(v.score);
        const rankStr = String(v.rank).padStart(2, '0');

        const card = document.createElement('div');
        card.className = 'video-card';
        card.style.animationDelay = `${i * 55}ms`;
        card.innerHTML = `
          <span class="rank-number">${rankStr}</span>
          <div class="card-body">
            <a class="card-channel" href="${v.channel_url}" target="_blank" rel="noopener">${v.channel_name}</a>
            <h2 class="card-title">${v.title}</h2>
            <p class="card-summary">${v.summary}</p>
            <div class="card-tags">${tags}</div>
            <p class="card-reason">${v.ranking_reason}</p>
            <div class="card-footer">
              <a class="watch-link" href="${v.url}" target="_blank" rel="noopener">▶ Watch</a>
            </div>
          </div>
          <div class="card-score">
            <span class="score-value" style="color:${color}">${v.score}</span>
            <span class="score-label">/ 100</span>
            <div class="score-bar-wrap">
              <div class="score-bar-fill" style="height:${barHeight}; background:${color}; animation-delay:${i * 55 + 200}ms;"></div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ─── RENDER EVENTS ────────────────────────────────────────────────
    const EVENTS_VISIBLE = 6;

    function renderEvents() {
      const grid = document.getElementById('events-grid');
      const sorted = [...EVENTS].sort((a, b) => b.score - a.score);
      document.getElementById('event-count').textContent = `${sorted.length} events · next 2 weeks`;

      sorted.forEach((e, i) => {
        const color = scoreColor(e.score);
        const hidden = i >= EVENTS_VISIBLE;
        const card = document.createElement('div');
        card.className = 'event-card' + (hidden ? ' event-hidden' : '');
        card.style.animationDelay = `${i * 60}ms`;
        card.innerHTML = `
          <div class="event-datetime">
            <span>${e.date}</span>
            <span>${e.time}</span>
          </div>
          <h2 class="event-title">${e.title}</h2>
          <p class="event-location">📍 ${e.location}</p>
          <p class="event-summary">${e.summary}</p>
          <div class="event-footer">
            <span class="event-score" style="color:${color}">${e.score}/100</span>
            <a class="rsvp-link" href="${e.url}" target="_blank" rel="noopener">RSVP →</a>
          </div>
        `;
        grid.appendChild(card);
      });

      // See more button
      const remaining = sorted.length - EVENTS_VISIBLE;
      if (remaining > 0) {
        const btn = document.createElement('button');
        btn.className = 'see-more-btn';
        btn.id = 'see-more-btn';
        btn.innerHTML = `Show ${remaining} more events ↓`;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.event-hidden').forEach((el, idx) => {
            el.style.animationDelay = `${idx * 60}ms`;
            el.classList.remove('event-hidden');
          });
          btn.remove();
        });
        grid.after(btn);
      }
    }

    // ─── TABS ─────────────────────────────────────────────────────────
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.section;
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(target).classList.add('active');
      });
    });

    // ─── DATE ─────────────────────────────────────────────────────────
    const now = new Date();
    document.getElementById('current-date').textContent =
      now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();

    // ─── INIT ─────────────────────────────────────────────────────────
    renderVideos();
    renderEvents();
  </script>
