services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aggregator}
      POSTGRES_DB: ${POSTGRES_DB:-aggregator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator}@db:5432/${POSTGRES_DB:-aggregator}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - .:/app

volumes:
  postgres_data:
